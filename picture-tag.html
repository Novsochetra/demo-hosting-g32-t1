<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Tag</title>
</head>
<body>
    <h1>Picture Tag</h1>
    <img src="" src alt="">

    <picture>
        <!-- 0px -> 300px -->
        <!-- media="(min-width: 300px)" -->
        <source 
            media="(max-width: 300px)"
            srcset="./assets/dragonball-z-300.jpeg"
        />
        <!-- 301px -> 500px -->
        <source 
            media="(max-width: 500px)"
            srcset="./assets/dragonball-z-500.jpeg"
        />

        <!-- 501px -> 700px -->
        <source 
            media="(max-width: 700px)"
            srcset="./assets/dragonball-z-700.jpeg"
        />

        <!-- 700px -> 1000px -->
        <source 
            media="(max-width: 1000px)"
            srcset="./assets/dragonball-z-1000.jpeg"
        />

        <!-- 1001px -> 2000px -->
        <source 
            media="(max-width: 2000px)"
            srcset="./assets/dragonball-z-2000.jpg"
        />

        <img src="./assets/dragonball-z.jpg" width="100%" />
    </picture>
</body>
</html>
